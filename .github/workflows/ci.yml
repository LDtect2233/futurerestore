name: Futurerestore

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 1 *'
    - cron: '0 0 1 4 *'
    - cron: '0 0 30 6 *'
    - cron: '0 0 28 9 *'
    - cron: '0 0 27 12 *'

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0
      
      - name: Linux Build
        id: Linux
        uses: addnab/docker-run-action@v3
        with:
          image: debian:buster-slim
          options: -v ${{ github.workspace }}:/github/workspace
          run: |
            # Copy the repository to a working directory inside the container
            cp -r /github/workspace /tmp/Builder/repos/futurerestore
            cd /tmp/Builder/repos/futurerestore
            
            # Run the build scripts
            ./.github/workflows/linux-bootstrap.sh
            ./.github/workflows/linux-build.sh
            ./.github/workflows/linux-post.sh
            
            # Copy the generated artifacts back to the workspace
            cp *.tar.xz /github/workspace/.github/workflows/ || true
            cp name*.txt /github/workspace/.github/workflows/ || true

      - name: Create artifact directories
        id: Create-Dirs
        run: |
          mkdir -p ${{ github.workspace }}/artifacts
          # Check if files exist and copy them
          if ls ${{ github.workspace }}/.github/workflows/futurerestore*.tar.xz 1> /dev/null 2>&1; then
            cp ${{ github.workspace }}/.github/workflows/futurerestore*.tar.xz ${{ github.workspace }}/artifacts/
          fi

      - name: Linux x86_64 RELEASE Build
        id: Linux-x86_64-RELEASE-Build
        run: |
          if [ -f "${{ github.workspace }}/.github/workflows/futurerestore1.tar.xz" ]; then
            sudo chown -R $USER:$USER ${{ github.workspace }}/../
            mv ${{ github.workspace }}/.github/workflows/futurerestore1.tar.xz ${{ github.workspace }}/.github/workflows/$(cat ${{ github.workspace }}/.github/workflows/name1.txt 2>/dev/null || echo "futurerestore-Linux-x86_64-RELEASE.tar.xz")
          else
            echo "Warning: futurerestore1.tar.xz not found, skipping rename"
          fi

      - name: Linux x86_64 DEBUG Build
        id: Linux-x86_64-DEBUG-Build
        run: |
          if [ -f "${{ github.workspace }}/.github/workflows/futurerestore2.tar.xz" ]; then
            mv ${{ github.workspace }}/.github/workflows/futurerestore2.tar.xz ${{ github.workspace }}/.github/workflows/$(cat ${{ github.workspace }}/.github/workflows/name2.txt 2>/dev/null || echo "futurerestore-Linux-x86_64-DEBUG.tar.xz")
          else
            echo "Warning: futurerestore2.tar.xz not found, skipping rename"
          fi

      - name: Linux x86_64 ASAN Build
        id: Linux-x86_64-ASAN-Build
        run: |
          if [ -f "${{ github.workspace }}/.github/workflows/futurerestore3.tar.xz" ]; then
            mv ${{ github.workspace }}/.github/workflows/futurerestore3.tar.xz ${{ github.workspace }}/.github/workflows/$(cat ${{ github.workspace }}/.github/workflows/name3.txt 2>/dev/null || echo "futurerestore-Linux-x86_64-ASAN.tar.xz")
          else
            echo "Warning: futurerestore3.tar.xz not found, skipping rename"
          fi

      - name: List artifacts
        id: List-Artifacts
        run: |
          echo "Files in .github/workflows:"
          ls -la ${{ github.workspace }}/.github/workflows/ || echo "No files found"

      - name: futurerestore Linux x86_64 RELEASE Archive
        id: futurerestore-Linux-x86_64-RELEASE-Archive
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-x86_64-RELEASE
          path: |
            ${{ github.workspace }}/.github/workflows/futurerestore-Linux-x86_64*-RELEASE.tar.xz
          if-no-files-found: warn

      - name: futurerestore Linux x86_64 DEBUG Archive
        id: futurerestore-Linux-x86_64-DEBUG-Archive
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-x86_64-DEBUG
          path: |
            ${{ github.workspace }}/.github/workflows/futurerestore-Linux-x86_64*-DEBUG.tar.xz
          if-no-files-found: warn

      - name: futurerestore Linux x86_64 ASAN Archive
        id: futurerestore-Linux-x86_64-ASAN-Archive
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-x86_64-ASAN
          path: |
            ${{ github.workspace }}/.github/workflows/futurerestore-Linux-x86_64*-ASAN.tar.xz
          if-no-files-found: warn
