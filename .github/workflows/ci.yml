name: Futurerestore

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 1 *'
    - cron: '0 0 1 4 *'
    - cron: '0 0 30 6 *'
    - cron: '0 0 28 9 *'
    - cron: '0 0 27 12 *'

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0
      
      - name: Fix apt and install dependencies
        run: |
          # Kill any apt processes that might be running
          sudo pkill -9 apt || true
          sudo pkill -9 dpkg || true
          
          # Clean up apt locks and cache
          sudo rm -f /var/lib/apt/lists/lock
          sudo rm -f /var/cache/apt/archives/lock
          sudo rm -f /var/lib/dpkg/lock*
          sudo dpkg --configure -a
          
          # Update and install
          sudo apt-get clean
          sudo apt-get update --fix-missing
          sudo apt-get install -y \
            build-essential \
            git \
            curl \
            libssl-dev \
            libusb-1.0-0-dev \
            libreadline-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            xz-utils \
            file \
            unzip

      - name: Build Linux futurerestore
        run: |
          # Make scripts executable
          chmod +x .github/workflows/linux-*.sh
          
          # Run the build scripts
          ./.github/workflows/linux-bootstrap.sh
          ./.github/workflows/linux-build.sh
          ./.github/workflows/linux-post.sh
          
          # List generated files
          echo "=== Generated files ==="
          ls -la *.tar.xz 2>/dev/null || echo "No tar.xz files found"
          ls -la name*.txt 2>/dev/null || echo "No name*.txt files found"
          echo "======================"

      - name: Rename Linux artifacts
        run: |
          # Rename artifacts using the names from the build scripts
          if [ -f "futurerestore1.tar.xz" ] && [ -f "name1.txt" ]; then
            NEW_NAME=$(cat name1.txt)
            mv futurerestore1.tar.xz "$NEW_NAME"
            echo "Renamed futurerestore1.tar.xz to $NEW_NAME"
          elif [ -f "futurerestore1.tar.xz" ]; then
            mv futurerestore1.tar.xz futurerestore-Linux-x86_64-RELEASE.tar.xz
            echo "Renamed futurerestore1.tar.xz to futurerestore-Linux-x86_64-RELEASE.tar.xz"
          else
            echo "Warning: futurerestore1.tar.xz not found"
          fi
          
          if [ -f "futurerestore2.tar.xz" ] && [ -f "name2.txt" ]; then
            NEW_NAME=$(cat name2.txt)
            mv futurerestore2.tar.xz "$NEW_NAME"
            echo "Renamed futurerestore2.tar.xz to $NEW_NAME"
          elif [ -f "futurerestore2.tar.xz" ]; then
            mv futurerestore2.tar.xz futurerestore-Linux-x86_64-DEBUG.tar.xz
            echo "Renamed futurerestore2.tar.xz to futurerestore-Linux-x86_64-DEBUG.tar.xz"
          else
            echo "Warning: futurerestore2.tar.xz not found"
          fi
          
          if [ -f "futurerestore3.tar.xz" ] && [ -f "name3.txt" ]; then
            NEW_NAME=$(cat name3.txt)
            mv futurerestore3.tar.xz "$NEW_NAME"
            echo "Renamed futurerestore3.tar.xz to $NEW_NAME"
          elif [ -f "futurerestore3.tar.xz" ]; then
            mv futurerestore3.tar.xz futurerestore-Linux-x86_64-ASAN.tar.xz
            echo "Renamed futurerestore3.tar.xz to futurerestore-Linux-x86_64-ASAN.tar.xz"
          else
            echo "Warning: futurerestore3.tar.xz not found"
          fi

      - name: List final artifacts
        run: |
          echo "=== Final artifacts ==="
          ls -la *.tar.xz 2>/dev/null || echo "No tar.xz files found"
          echo "======================"

      - name: Upload Linux RELEASE binary
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-RELEASE
          path: |
            futurerestore-Linux-x86_64*-RELEASE.tar.xz
            futurerestore-Linux-RELEASE.tar.xz
          if-no-files-found: warn

      - name: Upload Linux DEBUG binary
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-DEBUG
          path: |
            futurerestore-Linux-x86_64*-DEBUG.tar.xz
            futurerestore-Linux-DEBUG.tar.xz
          if-no-files-found: warn

      - name: Upload Linux ASAN binary
        uses: actions/upload-artifact@v4
        with:
          name: futurerestore-Linux-ASAN
          path: |
            futurerestore-Linux-x86_64*-ASAN.tar.xz
            futurerestore-Linux-ASAN.tar.xz
          if-no-files-found: warn
